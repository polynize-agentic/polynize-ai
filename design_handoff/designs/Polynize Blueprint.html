<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Polynize · Blueprint</title>

<link rel="stylesheet" href="shared/tokens.css" />
<link rel="stylesheet" href="blueprints/blueprint.css" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
  body { min-height: 100vh; }

  /* print */
  @media print {
    .bp-top, .bp-scroll-cue { display: none !important; }
    .bp-page, .bp-cover, .bp-final { page-break-after: always; }
  }
</style>
</head>
<body class="bp-body">

<header class="bp-top" id="bp-top">
  <div class="bp-top-left">
    <a href="Polynize Homepage B.html">polynize.ai</a>
    <span style="opacity:.4; margin: 0 8px;">/</span>
    <span style="color: var(--text);">blueprint</span>
  </div>
  <div class="bp-top-right">
    <button class="bp-top-btn" onclick="window.print()">print / pdf</button>
    <a href="Polynize Agents.html?reset=1" class="bp-top-btn">start over</a>
    <button class="bp-top-btn primary" onclick="scrollToFinal()">book a call →</button>
  </div>
</header>

<main id="blueprint-root"></main>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="blueprints/blueprint-data.js"></script>

<script type="text/babel" src="blueprints/bp-01-cover.jsx"></script>
<script type="text/babel" src="blueprints/bp-02-heatmap.jsx"></script>
<script type="text/babel" src="blueprints/bp-03-team.jsx"></script>
<script type="text/babel" src="blueprints/bp-04-day.jsx"></script>
<script type="text/babel" src="blueprints/bp-05-pricing.jsx"></script>

<script type="text/babel">
  // ========================================================================
  // CC-TODO (blueprint edge states):
  //   - 404 state: invalid blueprint id should render a branded not-found
  //     panel, not fall through to demo data (that's prototype behavior).
  //   - Loading state: in production `/blueprints/[id]` fetches from the DB;
  //     design a skeleton for the 5 pages.
  //   - Stale / expired state: optional — if a blueprint is > N days old,
  //     show a "rebuild from latest pricing" banner.
  //   - Print view: already works via native Cmd+P. Test it produces a
  //     clean 5-page PDF and wire an explicit "Download PDF" button.
  //   - Email preview parity: blueprint-ready email should include a
  //     thumbnail matching the cover page.
  // ========================================================================

  // Load blueprint state: try URL param, then localStorage from /agents, then default demo
  const loadBlueprintState = () => {
    try {
      const params = new URLSearchParams(location.search);
      if (params.get('demo') === '1') return window.BLUEPRINT_DEFAULT;
      const raw = localStorage.getItem('polynize_agents_state_v1');
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.answers && parsed.data) return parsed;
      }
    } catch (e) { console.warn('blueprint state load failed', e); }
    return window.BLUEPRINT_DEFAULT;
  };

  const state = loadBlueprintState();
  const { answers, data } = state;

  window.scrollToFinal = () => {
    const el = document.getElementById('bp-final');
    if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
  };

  const Blueprint = () => (
    <>
      <window.BlueprintCover answers={answers} data={data} />
      <window.BlueprintHeatMap answers={answers} data={data} />
      <window.BlueprintTeam answers={answers} data={data} />
      <window.BlueprintDay answers={answers} data={data} />
      <window.BlueprintPricing answers={answers} data={data} />

      <section id="bp-final" className="bp-final" data-screen-label="Page 06 · Final CTA">
        <div className="bp-eyebrow">§ next_step</div>
        <h2 className="bp-final-title">
          30 minutes.<br/>
          We sharpen this<br/>
          into a number<span className="mint">.</span>
        </h2>
        <p className="bp-final-lede">
          Book a call with Sagar. Bring this blueprint. We'll lock scope, timeline,
          and the exact price for {answers.q1_company || 'your team'} in one conversation.
        </p>
        <div className="bp-ctas">
          <a href="#" className="bp-cta primary">book_a_call →</a>
          <button className="bp-cta secondary" onClick={() => window.print()}>download_pdf</button>
        </div>
      </section>
    </>
  );

  ReactDOM.createRoot(document.getElementById('blueprint-root')).render(<Blueprint />);
</script>

</body>
</html>
