name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any earlier run on the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      # Build with placeholder env vars. Real secrets only need to land at
      # runtime on Vercel; the build itself doesn't make outbound calls and
      # only validates that the bundle compiles end-to-end.
      - name: Build
        run: npm run build
        env:
          # Stand-ins so the build doesn't fail on missing-required-env
          # checks. None of these reach a real service during build.
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          SUPABASE_ANON_KEY: placeholder
          KIMI_API_KEY: placeholder
          PROPOSALS_PASSWORD: ci-placeholder
          NEXT_PUBLIC_SITE_URL: https://polynize.ai
